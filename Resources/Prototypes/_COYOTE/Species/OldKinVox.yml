- type: species
  id: OldKinVox
  name: species-name-oldkinvox
  roundStart: true
  prototype: MobOldKinVox
  sprites: MobOldKinVoxSprites
  markingLimits: MobOldKinVoxMarkingLimits
  dollPrototype: MobOldKinVoxDummy
  skinColoration: Hues # imp VoxFeathers<Hues
  defaultSkinTone: "#526d29"
  maleFirstNames: NamesVox
  femaleFirstNames: NamesVox
  naming: First
  sexes:
  - Unsexed # NO WAY MY VOX SEXES ALL THE TIME
  kind:
  - VoxLike

  minAge: 500     # OLD-kin, for a reason.
  maxAge: 1000000 # Their age is based off their cortical stack, not the body they inhabit
  youngAge: 4000  # They saw jebus rise and fall, and wonder why humans think they are superior
  oldAge: 400000

  minHeight: 0.9
  defaultHeight: 1.2
  maxHeight: 1.3
  minWidth: 0.85
  defaultWidth: 1.2
  maxWidth: 1.35

- type: speciesBaseSprites
  id: MobOldKinVoxSprites
  sprites:
    Head: MobOldKinVoxHead
    Snout: MobHumanoidAnyMarking
    Hair: MobHumanoidAnyMarking
    FacialHair: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Chest: MobOldKinVoxTorso
    Eyes: MobOldKinVoxEyes
    LArm: MobOldKinVoxLArm
    RArm: MobOldKinVoxRArm
    LHand: MobOldKinVoxLHand
    RHand: MobOldKinVoxRHand
    LLeg: MobOldKinVoxLLeg
    RLeg: MobOldKinVoxRLeg
    LFoot: MobOldKinVoxLFoot
    RFoot: MobOldKinVoxRFoot
    Tail: MobHumanoidAnyMarking
    TailBehind: MobHumanoidAnyMarking
    TailOversuit: MobHumanoidAnyMarking

- type: markingPoints
  id: MobOldKinVoxMarkingLimits
  onlyWhitelisted: true
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Head:
      points: 3
      required: true
      defaultMarkings: [ OldKinVoxBeak, OldKinVoxCrest ]
    Arms:
      points: 5
      required: true
      defaultMarkings: [ OldKinVoxClawsHandsLeft, OldKinVoxClawsHandsRight, OldKinVoxScutesArmsLeft, OldKinVoxScutesArmsRight ]
    Legs:
      points: 4
      required: true
      defaultMarkings: [ OldKinVoxClawsFeetLeft, OldKinVoxClawsFeetRight, OldKinVoxScutesLegsLeft, OldKinVoxScutesLegsRight ]
    UndergarmentTop:
      points: 3
      required: false
    UndergarmentBottom:
      points: 3
      required: false
    Chest:
      points: 2
      required: false
    Overlay: # imp
      points: 4
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ OldKinVoxTail ]


